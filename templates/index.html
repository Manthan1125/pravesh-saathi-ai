<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pravesh Saathi | Neural AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #000000;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .floor-glow {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 400px;
      background: radial-gradient(ellipse at bottom, rgba(139, 92, 246, 0.15) 0%, rgba(56, 189, 248, 0.05) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    .app-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8vw;
      width: 100%;
      max-width: 1100px;
      height: 100vh;
      padding: 20px;
      z-index: 10;
      position: relative;
      transition: all 0.5s ease;
    }

    /* --- THE SHIMMER ORB --- */
    .orb-wrapper {
      flex: 0 0 320px;
      height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .orb-canvas {
      position: relative;
      width: 320px;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      box-shadow:
        inset 0 0 20px rgba(255, 255, 255, 0.05),
        inset 10px 0 40px rgba(255, 255, 255, 0.1),
        inset -10px 0 40px rgba(255, 255, 255, 0.1),
        inset 0 -30px 50px rgba(255, 255, 255, 0.15),
        0 30px 60px rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01) 60%, transparent 80%);
      z-index: 2;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: all 0.5s ease;
    }

    .blobs {
      position: absolute;
      inset: 0;
      z-index: 1;
      border-radius: 50%;
      overflow: hidden;
      mask-image: radial-gradient(white, black);
      -webkit-mask-image: -webkit-radial-gradient(white, black);
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(35px);
      opacity: 0.85;
      animation: float-blob 8s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .blob-1 {
      background: #3b82f6;
      width: 180px;
      height: 180px;
      top: -10%;
      left: -10%;
      animation-delay: 0s;
    }

    .blob-2 {
      background: #10b981;
      width: 200px;
      height: 200px;
      bottom: -10%;
      left: 10%;
      animation-delay: -2s;
    }

    .blob-3 {
      background: #a855f7;
      width: 160px;
      height: 160px;
      top: 20%;
      right: -10%;
      animation-delay: -4s;
    }

    .blob-4 {
      background: #ef4444;
      width: 150px;
      height: 150px;
      bottom: 10%;
      right: 10%;
      animation-delay: -6s;
    }

    @keyframes float-blob {
      0% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(20px, -30px) scale(1.1);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }

      100% {
        transform: translate(30px, 30px) scale(1.05);
      }
    }

    .orb-highlight {
      position: absolute;
      top: 5%;
      left: 15%;
      width: 40%;
      height: 20%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.4) 0%, transparent 70%);
      transform: rotate(-30deg);
      filter: blur(5px);
      z-index: 3;
      pointer-events: none;
    }

    .face {
      position: absolute;
      z-index: 4;
      display: flex;
      gap: 30px;
      justify-content: center;
      transition: transform 0.1s linear;
    }

    .eye {
      width: 14px;
      height: 44px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .orb-canvas.typing .eye {
      height: 12px;
      transform: translateY(15px);
    }

    .orb-canvas.listening .blob {
      filter: blur(25px);
      animation-duration: 2s;
    }

    .orb-canvas.listening .eye {
      height: 50px;
      background: #10b981;
      box-shadow: 0 0 20px #10b981;
    }

    .orb-canvas.speaking .blob {
      animation-duration: 1.5s;
    }

    .orb-canvas.speaking .eye {
      animation: eye-talk 0.2s infinite alternate;
    }

    @keyframes eye-talk {
      0% {
        height: 44px;
        transform: translateY(0);
      }

      100% {
        height: 30px;
        transform: translateY(-5px);
      }
    }

    .orb-shadow {
      position: absolute;
      bottom: 0px;
      width: 220px;
      height: 20px;
      background: radial-gradient(ellipse at center, rgba(168, 85, 247, 0.4) 0%, transparent 70%);
      filter: blur(10px);
      animation: shadow-pulse 4s infinite alternate;
    }

    @keyframes shadow-pulse {
      0% {
        opacity: 0.5;
        transform: scale(0.9);
      }

      100% {
        opacity: 1;
        transform: scale(1.1);
      }
    }


    /* --- CHAT INTERFACE --- */
    .card {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      width: 100%;
      max-width: 440px;
      padding: 2rem;
      position: relative;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.5s ease;
      display: flex;
      flex-direction: column;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .brand-sub {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .badge {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 10px;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
      animation: blink 2s infinite;
    }

    /* Equalizer Waves */
    .waves {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 32px;
      margin-bottom: 1.5rem;
      transition: all 0.3s;
    }

    .wave {
      width: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      transition: height 0.15s, background 0.3s;
    }

    .waves.active .wave {
      background: #a855f7;
      box-shadow: 0 0 8px #a855f7;
    }

    .waves.speaking .wave {
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    .status-label {
      text-align: center;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .status-label.active {
      color: #a855f7;
    }

    .status-label.speaking {
      color: #10b981;
    }

    /* Call Duration Timer */
    .call-timer {
      font-size: 3rem;
      font-weight: 300;
      text-align: center;
      font-variant-numeric: tabular-nums;
      margin: 1rem 0 2rem 0;
      color: #fff;
      display: none;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    /* Chat Area (Hides during call) */
    .chat {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1.2rem;
      min-height: 160px;
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
      box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.5);
      transition: all 0.4s;
    }

    .chat::-webkit-scrollbar {
      width: 4px;
    }

    .chat::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 4px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .msg.agent {
      align-self: flex-start;
    }

    .msg-name {
      font-size: 10px;
      color: #64748b;
      margin-bottom: 4px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .msg.user .bubble {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.agent .bubble {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    /* Action Buttons Area */
    .action-area {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .text-input-group {
      display: flex;
      gap: 10px;
      width: 100%;
      transition: all 0.4s;
    }

    .text-input-group input {
      flex: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 14px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      outline: none;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .text-input-group input:focus {
      border-color: #a855f7;
      background: rgba(0, 0, 0, 0.8);
    }

    .text-input-group button {
      background: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Call Action Buttons */
    .btn-call {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
      transition: all 0.3s;
    }

    .btn-call:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px rgba(16, 185, 129, 0.4);
    }

    .btn-call svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .btn-end {
      display: none;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #ef4444;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(239, 68, 68, 0.4);
      transition: all 0.3s;
      margin: 0 auto;
    }

    .btn-end:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 30px rgba(239, 68, 68, 0.6);
    }

    .btn-end svg {
      width: 28px;
      height: 28px;
      stroke: white;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }


    /* --- ACTIVE CALL MODE TRANSITIONS --- */
    .app-container.in-call .chat {
      display: none;
    }

    .app-container.in-call .text-input-group {
      display: none;
    }

    .app-container.in-call .btn-call {
      display: none;
    }

    .app-container.in-call .btn-end {
      display: flex;
      animation: fadeIn 0.5s;
    }

    .app-container.in-call .call-timer {
      display: block;
      animation: fadeIn 0.5s;
    }

    .app-container.in-call .orb-wrapper {
      transform: scale(1.1);
    }

    .app-container.in-call .card {
      background: rgba(0, 0, 0, 0.6);
      border-color: rgba(168, 85, 247, 0.3);
      box-shadow: 0 0 100px rgba(168, 85, 247, 0.2);
    }

    @media (max-width: 900px) {
      .app-container {
        flex-direction: column;
        height: auto;
        margin-top: 2rem;
      }

      .orb-wrapper {
        height: 350px;
        flex: 0 0 350px;
      }
    }
  </style>
</head>

<body>

  <div class="floor-glow"></div>

  <div class="app-container" id="appContainer">

    <div class="orb-wrapper">
      <div class="orb-canvas" id="orbCanvas">
        <div class="blobs">
          <div class="blob blob-1"></div>
          <div class="blob blob-2"></div>
          <div class="blob blob-3"></div>
          <div class="blob blob-4"></div>
        </div>
        <div class="orb-highlight"></div>
        <div class="face" id="orbFace">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
      </div>
      <div class="orb-shadow"></div>
    </div>

    <div class="card">
      <div class="top">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" />
              <path d="M19 10a7 7 0 0 1-14 0" />
            </svg>
          </div>
          <div>
            <div class="brand-name">Pravesh Saathi</div>
            <div class="brand-sub">Neural Voice Agent</div>
          </div>
        </div>
        <div class="badge">
          <div class="badge-dot"></div>Online
        </div>
      </div>

      <div class="call-timer" id="callTimer">00:00</div>

      <div class="waves" id="waves">
        <div class="wave" style="height:6px"></div>
        <div class="wave" style="height:14px"></div>
        <div class="wave" style="height:8px"></div>
        <div class="wave" style="height:22px"></div>
        <div class="wave" style="height:10px"></div>
        <div class="wave" style="height:28px"></div>
        <div class="wave" style="height:14px"></div>
        <div class="wave" style="height:20px"></div>
        <div class="wave" style="height:8px"></div>
        <div class="wave" style="height:24px"></div>
        <div class="wave" style="height:12px"></div>
        <div class="wave" style="height:6px"></div>
      </div>

      <div class="status-label" id="statusLabel">Ready to connect</div>

      <div class="chat" id="chat"></div>

      <div class="action-area">
        <button class="btn-call" id="btnCall">
          <svg viewBox="0 0 24 24">
            <path
              d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.03 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z" />
          </svg>
          Start Voice Call
        </button>

        <div class="text-input-group" id="textGroup">
          <input type="text" id="textInput" placeholder="Or type a message..." autocomplete="off" />
          <button id="sendBtn">Send</button>
        </div>

        <button class="btn-end" id="btnEnd" title="End Call">
          <svg viewBox="0 0 24 24">
            <path
              d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-3.33-2.67m-2.67-3.34a19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // --- 3D ORB FACE TRACKING ---
    const orbCanvas = document.getElementById('orbCanvas');
    const orbFace = document.getElementById('orbFace');

    document.addEventListener('mousemove', (e) => {
      if (orbCanvas.classList.contains('typing')) return;
      const xAxis = (window.innerWidth / 2 - e.pageX) / 12;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 12;
      orbFace.style.transform = `translate(${-xAxis}px, ${-yAxis}px)`;
    });

    const textInput = document.getElementById('textInput');
    textInput.addEventListener('focus', () => {
      orbCanvas.classList.add('typing');
      orbFace.style.transform = 'translate(0px, 30px)';
    });
    textInput.addEventListener('blur', () => {
      orbCanvas.classList.remove('typing');
      orbFace.style.transform = 'translate(0px, 0px)';
    });


    // --- VIRTUAL CALL AGENT LOGIC ---
    const SESSION_ID = 'session_' + Math.random().toString(36).substr(2, 9);

    const appContainer = document.getElementById('appContainer');
    const waves = document.getElementById('waves');
    const waveEls = waves.querySelectorAll('.wave');
    const statusLabel = document.getElementById('statusLabel');
    const chat = document.getElementById('chat');
    const sendBtn = document.getElementById('sendBtn');
    const btnCall = document.getElementById('btnCall');
    const btnEnd = document.getElementById('btnEnd');
    const callTimer = document.getElementById('callTimer');

    let isInCall = false;
    let isSpeaking = false;
    let recognition = null;
    let waveInterval = null;
    let timerInterval = null;
    let callSeconds = 0;
    const heights = [6, 14, 8, 22, 10, 28, 14, 20, 8, 24, 12, 6];

    // Timer Formatting
    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, '0');
      const s = (sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function startTimer() {
      callSeconds = 0;
      callTimer.textContent = "00:00";
      timerInterval = setInterval(() => {
        callSeconds++;
        callTimer.textContent = formatTime(callSeconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function animateWaves(active, speaking) {
      clearInterval(waveInterval);
      waves.className = 'waves' + (active ? ' active' : speaking ? ' speaking' : '');
      if (active || speaking) {
        waveInterval = setInterval(() => {
          waveEls.forEach(w => { w.style.height = (6 + Math.random() * 24) + 'px'; });
        }, 120);
      } else {
        heights.forEach((h, i) => waveEls[i].style.height = h + 'px');
      }
    }

    function setIdle() {
      orbCanvas.className = 'orb-canvas';
      statusLabel.className = 'status-label';
      statusLabel.textContent = isInCall ? 'Quiet...' : 'Ready to connect';
      animateWaves(false, false);
    }

    function setListening() {
      orbCanvas.className = 'orb-canvas listening';
      statusLabel.className = 'status-label active';
      statusLabel.textContent = 'Listening...';
      animateWaves(true, false);
    }

    function setThinking() {
      orbCanvas.className = 'orb-canvas';
      statusLabel.className = 'status-label active';
      clearInterval(waveInterval);
      let d = 0;
      waveInterval = setInterval(() => {
        d = (d + 1) % 4;
        statusLabel.textContent = 'Thinking' + '.'.repeat(d);
      }, 400);
    }

    function setSpeaking() {
      orbCanvas.className = 'orb-canvas speaking';
      statusLabel.className = 'status-label speaking';
      statusLabel.textContent = 'Agent Speaking...';
      animateWaves(false, true);
    }

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = `<div class="msg-name">${role === 'user' ? 'You' : 'Pravesh'}</div><div class="bubble">${text}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function cleanForSpeech(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/__(.*?)__/g, '$1')
        .replace(/\*(.*?)\*/g, '$1')
        .replace(/_(.*?)_/g, '$1')
        .replace(/`+[^`]*`+/g, '')
        .replace(/#{1,6}\s*/g, '')
        .replace(/^\s*\d+[\.\)]\s+/gm, '')
        .replace(/^\s*[-*•–]\s+/gm, '')
        .replace(/:\s*\n/g, '. ')
        .replace(/\s*:\s*/g, '. ')
        .replace(/[—–]/g, ', ')
        .replace(/\[([^\]]*)\]/g, '$1')
        .replace(/\(([^)]{0,25})\)/g, '$1')
        .replace(/\([^)]*\)/g, '')
        .replace(/B\.E\./gi, 'B E')
        .replace(/M\.E\./gi, 'M E')
        .replace(/B\.Tech\.?/gi, 'B Tech')
        .replace(/M\.Tech\.?/gi, 'M Tech')
        .replace(/Ph\.D\.?/gi, 'PhD')
        .replace(/P\.U\./gi, 'Panjab University')
        .replace(/U\.I\.E\.T\./gi, 'UIET')
        .replace(/\bCSE\b/g, 'C S E')
        .replace(/\bECE\b/g, 'E C E')
        .replace(/\bEEE\b/g, 'E E E')
        .replace(/\bIT\b/g, 'I T')
        .replace(/\//g, ' or ')
        .replace(/&/g, ' and ')
        .replace(/\+/g, ' plus ')
        .replace(/Rs\.?\s?([\d,]+)/gi, '$1 rupees')
        .replace(/%/g, ' percent')
        .replace(/\n+/g, ' ')
        .replace(/\s{2,}/g, ' ')
        .replace(/([,.;])\1+/g, '$1')
        .trim();
    }

    function speak(text) {
      if (!window.speechSynthesis) { setIdle(); return; }
      window.speechSynthesis.cancel();

      const clean = cleanForSpeech(text);
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = 'en-IN';
      u.rate = 0.88;
      u.pitch = 1.05;
      u.volume = 1;
      isSpeaking = true;
      setSpeaking();

      u.onend = () => {
        isSpeaking = false;
        setIdle();
        // In a continuous call, auto-restart microphone after speaking
        if (isInCall && recognition) {
          try { recognition.start(); } catch (e) { }
        }
      };
      window.speechSynthesis.speak(u);
    }

    async function askAgent(userText) {
      addMsg('user', userText);
      setThinking();

      // Stop mic while thinking/fetching
      if (recognition) { try { recognition.stop(); } catch (e) { } }

      const t2 = document.createElement('div');
      t2.id = 'thinking';
      t2.className = 'msg agent';
      t2.innerHTML = `<div class="msg-name">Pravesh</div><div class="bubble" style="color:#64748b">...</div>`;
      chat.appendChild(t2);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: userText, session_id: SESSION_ID })
        });
        const data = await res.json();
        document.getElementById('thinking')?.remove();

        // If backend sends an error (like Groq API limits), show it!
        const reply = data.reply || (data.error ? `Server Error: ${data.error}` : 'Call connection failed.');

        addMsg('agent', reply);
        speak(reply);
      } catch (e) {
        document.getElementById('thinking')?.remove();
        addMsg('agent', 'System offline. Please check if python app.py is running.');
        setIdle();
        if (isInCall && recognition) { try { recognition.start(); } catch (err) { } }
      }
    }

    // --- CALL BUTTON LOGIC (VIRTUAL WEBRTC SIMULATION) ---
    btnCall.addEventListener('click', () => {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Browser does not support Voice Calls.'); return; }

      if (!recognition) {
        recognition = new SR();
        recognition.lang = 'en-IN';
        recognition.interimResults = false;
        recognition.continuous = false; // We manually loop it

        recognition.onstart = () => { if (isInCall && !isSpeaking) setListening(); };

        recognition.onresult = e => {
          const transcript = e.results[0][0].transcript;
          if (transcript.trim()) {
            askAgent(transcript);
          }
        };

        recognition.onerror = () => { setIdle(); };

        recognition.onend = () => {
          // If we are still in call, and the agent is not speaking, resume listening!
          if (isInCall && !isSpeaking) {
            try { recognition.start(); } catch (e) { }
          } else {
            setIdle();
          }
        };
      }

      // Start Call Mode
      isInCall = true;
      appContainer.classList.add('in-call');
      startTimer();

      // Greeting
      speak("Hello! I am Pravesh Saathi. How can I help you with UIET admissions today?");
    });

    btnEnd.addEventListener('click', () => {
      isInCall = false;
      appContainer.classList.remove('in-call');
      stopTimer();
      setIdle();
      if (recognition) { try { recognition.stop(); } catch (e) { } }
      window.speechSynthesis.cancel();
      isSpeaking = false;
      statusLabel.textContent = "Call Ended";
      setTimeout(() => statusLabel.textContent = "Ready to connect", 2000);
    });

    // Text Chat Backup
    sendBtn.addEventListener('click', () => {
      const v = textInput.value.trim();
      if (!v) return;
      textInput.value = '';
      askAgent(v);
    });

    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendBtn.click();
    });

    // Initial load message
    setTimeout(() => addMsg('agent', 'Hello! I am Pravesh Saathi. Start a voice call or type a message below.'), 600);

  </script>
</body>
